name: Scaffold rename test

on:
  push:
    branches: [main]
  pull_request:

# Verifies scripts/rename-from-scaffold.sh produces a buildable plugin in
# both --mode iac and --mode non-iac. Includes a nested-fixture file to
# exercise the find-based bulk-sed (catches globstar regressions per
# workflow#762 plan C-P4 guard).
jobs:
  rename-non-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Add nested fixture file
        run: |
          mkdir -p internal/nested/sub
          cat > internal/nested/sub/test.go <<'EOF'
          // Fixture file deeper than one level - exercises the rename script's
          // find loop to verify imports in nested packages get rewritten.
          package sub
          import _ "github.com/GoCodeAlone/scaffold-workflow-plugin/internal"
          EOF
      - name: Rename to test-plugin (non-iac) + build
        run: |
          cp -r . /tmp/scaffold-copy
          cd /tmp/scaffold-copy
          bash scripts/rename-from-scaffold.sh test-plugin --mode non-iac
          go build ./...
          test -d cmd/workflow-plugin-test-plugin
          test ! -d cmd/scaffold-workflow-plugin
          test ! -d cmd/scaffold-workflow-plugin-iac
          test "$(jq -r .type plugin.json)" = "external"
          test "$(jq -r .name plugin.json)" = "workflow-plugin-test-plugin"

  rename-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Add nested fixture file
        run: |
          mkdir -p internal/nested/sub
          cat > internal/nested/sub/test.go <<'EOF'
          package sub
          import _ "github.com/GoCodeAlone/scaffold-workflow-plugin/internal"
          EOF
      - name: Rename to test-plugin (iac) + build
        run: |
          cp -r . /tmp/scaffold-copy
          cd /tmp/scaffold-copy
          bash scripts/rename-from-scaffold.sh test-plugin --mode iac
          go build ./...
          test -d cmd/workflow-plugin-test-plugin
          test ! -d cmd/scaffold-workflow-plugin
          test ! -d cmd/scaffold-workflow-plugin-iac
